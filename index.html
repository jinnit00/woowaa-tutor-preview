<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<title>LAIBA · A Cultural Exchange for Curious Families</title>
<meta name="description" content="A weekly cultural exchange where international gold-card holders, researchers, and top-school students meet curious Taiwanese families.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff7eb;
    --surface:#ffffff;
    --ink:#1c1917;
    --ink-soft:#44403c;
    --muted:#a8a29e;
    --line:#f0e8d5;
    --line-soft:#f7efdc;
    --primary:#ea580c;
    --primary-hover:#c2410c;
    --primary-soft:#fed7aa;
    --accent:#fbbf24;
    --accent-soft:#fef3c7;
    --highlight:#fde68a;
    --success:#84cc16;
    --rose:#fb7185;
    --sans:'Inter','Noto Sans TC','PingFang TC','Helvetica Neue',system-ui,sans-serif;
    --radius:16px;
    --radius-lg:24px;
    --shadow:0 2px 12px rgba(28,25,23,.04);
    --shadow-lg:0 10px 40px rgba(28,25,23,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:var(--sans);font-size:16px;line-height:1.7;font-weight:400;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  a{color:inherit}
  button{font:inherit;cursor:pointer}

  /* Hello bar */
  .hello-bar{
    background:linear-gradient(90deg,#fff1cc 0%,#fed7aa 100%);
    padding:10px 16px;text-align:center;
    font-size:13px;font-weight:500;color:var(--ink-soft);
    overflow:hidden;white-space:nowrap;
  }
  .hello-bar .hi{margin:0 12px;display:inline-block}
  .hello-bar .sep{color:var(--primary);margin:0 2px}

  /* Nav */
  .nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;background:rgba(255,247,235,.92);
    backdrop-filter:saturate(180%) blur(12px);
    position:sticky;top:0;z-index:100;border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand .logo{font-weight:800;font-size:22px;letter-spacing:.04em;color:var(--ink)}
  .brand .logo .spark{color:var(--primary);font-weight:400;margin-right:4px}
  .brand .logo-zh{font-size:13px;font-weight:500;color:var(--ink-soft);letter-spacing:.1em}
  .lang-wrap{position:relative}
  .lang-btn{
    background:var(--surface);border:1px solid var(--line);
    padding:8px 14px;border-radius:999px;font-size:13px;font-weight:500;
    color:var(--ink-soft);display:flex;align-items:center;gap:6px;
    transition:all .15s ease;
  }
  .lang-btn:hover{border-color:var(--primary-soft);color:var(--primary)}
  .lang-btn .chev{font-size:10px;color:var(--muted)}
  .lang-menu{
    display:none;position:absolute;right:0;top:calc(100% + 8px);
    background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:8px;min-width:200px;z-index:200;
    box-shadow:var(--shadow-lg);
  }
  .lang-menu.open{display:block}
  .lang-menu .row{
    display:flex;align-items:center;justify-content:space-between;width:100%;
    padding:10px 14px;background:transparent;border:0;border-radius:8px;
    text-align:left;font-size:14px;color:var(--ink-soft);
  }
  .lang-menu .row:not([disabled]):hover{background:var(--accent-soft);color:var(--ink)}
  .lang-menu .row[data-active="true"]{background:var(--primary-soft);color:var(--primary-hover);font-weight:600}
  .lang-menu .row[disabled]{color:var(--muted);cursor:not-allowed}
  .lang-menu .lab{display:flex;align-items:center;gap:10px}
  .lang-menu .lab .flag{font-size:18px}
  .lang-menu .soon{font-size:11px;color:var(--muted);font-style:italic}

  /* Sections */
  section{padding:64px 20px}
  .wrap{max-width:1120px;margin:0 auto}
  .kicker{
    display:inline-flex;align-items:center;gap:8px;
    font-size:13px;font-weight:600;color:var(--primary);
    letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;
  }
  .kicker::before{content:"";display:inline-block;width:24px;height:2px;background:var(--primary);border-radius:2px}
  h1{font-size:clamp(32px,6.5vw,56px);line-height:1.1;font-weight:800;letter-spacing:-.02em;margin-bottom:20px}
  h2{font-size:clamp(26px,4.5vw,40px);line-height:1.15;font-weight:700;letter-spacing:-.015em;margin-bottom:16px}
  h3{font-size:clamp(18px,2.4vw,22px);line-height:1.3;font-weight:700;margin-bottom:8px}
  .lead{font-size:clamp(16px,2vw,19px);color:var(--ink-soft);max-width:64ch;line-height:1.65;margin-bottom:24px}
  .highlight{background:linear-gradient(transparent 60%,var(--highlight) 60%);padding:0 4px;border-radius:2px}

  /* Hero */
  .hero{padding:48px 20px 72px;text-align:left}
  .hero .wrap{max-width:880px}
  .hero-meta{
    display:flex;flex-wrap:wrap;gap:18px;margin-top:36px;
    font-size:14px;color:var(--ink-soft);font-weight:500;
  }
  .hero-meta span{display:flex;align-items:center;gap:6px}
  .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px}
  .cta-primary{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--primary);color:#fff;text-decoration:none;
    padding:16px 28px;border-radius:999px;font-size:15px;font-weight:600;
    transition:transform .12s ease,background .15s ease;
    box-shadow:0 4px 14px rgba(234,88,12,.32);
  }
  .cta-primary:hover{background:var(--primary-hover);transform:translateY(-1px)}
  .cta-primary .arr{font-weight:400}
  .cta-secondary{
    display:inline-flex;align-items:center;gap:8px;
    color:var(--ink-soft);text-decoration:none;padding:14px 20px;
    font-size:15px;font-weight:500;border-radius:999px;
  }
  .cta-secondary:hover{color:var(--primary);background:var(--accent-soft)}

  /* Members */
  .members{background:linear-gradient(180deg,var(--bg) 0%,#fff1d6 100%)}
  .lead-in-quote{
    background:var(--surface);border-radius:var(--radius-lg);
    padding:24px 28px;margin:24px 0 36px;box-shadow:var(--shadow);
    border-left:4px solid var(--accent);
    font-size:17px;line-height:1.65;color:var(--ink);font-style:italic;
    max-width:780px;
  }
  .lead-in-quote::before{content:"🌟 ";font-style:normal}
  .archetypes{display:grid;grid-template-columns:1fr;gap:20px}
  .archetype{
    background:var(--surface);border-radius:var(--radius);
    padding:24px;box-shadow:var(--shadow);
    transition:transform .15s ease,box-shadow .15s ease;
    display:flex;flex-direction:column;gap:12px;
  }
  .archetype:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .archetype-head{display:flex;align-items:center;gap:14px}
  .archetype-avatar{
    width:64px;height:64px;border-radius:50%;
    object-fit:cover;flex-shrink:0;background:var(--accent-soft);
  }
  .archetype-role{font-size:17px;font-weight:700;line-height:1.3}
  .archetype-quote{
    color:var(--ink-soft);font-size:15px;line-height:1.65;
    padding-left:14px;border-left:3px solid var(--accent);
  }
  .disclaimer{
    text-align:center;font-size:12px;color:var(--muted);
    margin-top:28px;font-style:italic;
  }

  /* Why */
  .why .pillars{display:grid;grid-template-columns:1fr;gap:20px;margin-top:32px}
  .pillar{
    background:var(--surface);border-radius:var(--radius);padding:28px 24px;
    box-shadow:var(--shadow);
  }
  .pillar-emoji{font-size:36px;margin-bottom:12px;display:block}
  .pillar h3{margin-bottom:8px}
  .pillar p{font-size:15px;color:var(--ink-soft);line-height:1.65}

  /* Vetting */
  .vetting{background:#fffaef}
  .vetting .cards{display:grid;grid-template-columns:1fr;gap:20px;margin-top:32px}
  .vetting-card{
    background:var(--surface);border-radius:var(--radius-lg);padding:28px 24px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .vetting-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--primary) 0%,var(--accent) 100%);
  }
  .vetting-card .label{
    font-size:12px;font-weight:600;color:var(--primary);
    letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;
  }
  .vetting-card .vlabel{font-size:30px;margin-bottom:6px;display:inline-block}
  .vetting-card ul{list-style:none;margin-top:14px}
  .vetting-card li{
    padding:8px 0 8px 28px;font-size:14.5px;color:var(--ink-soft);
    position:relative;border-bottom:1px solid var(--line-soft);
  }
  .vetting-card li::before{
    content:"✓";position:absolute;left:6px;color:var(--success);font-weight:700;
  }
  .vetting-card li:last-child{border-bottom:none}
  .vetting-card li strong{color:var(--ink);font-weight:700}
  .vetting-card .reject{
    margin-top:14px;padding:12px 14px;border-radius:10px;
    background:#fef2f2;color:#b91c1c;font-size:13.5px;
    display:flex;align-items:center;gap:8px;
  }
  .vetting-card .reject::before{content:"⛔";font-size:18px}

  /* Teachers */
  .teachers .teacher-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:32px}
  .teacher{
    background:var(--surface);border-radius:var(--radius);padding:20px;
    display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow);
    transition:transform .12s ease;
  }
  .teacher:hover{transform:translateY(-1px)}
  .teacher .flag{
    width:48px;height:48px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:28px;
    background:var(--accent-soft);
  }
  .teacher .info{flex:1;min-width:0}
  .teacher .country{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .teacher .country-zh{font-size:12px;color:var(--muted);font-weight:500}
  .teacher .bio{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin-top:6px}

  /* Session */
  .session-steps{margin-top:32px;display:grid;gap:20px;grid-template-columns:1fr}
  .session-step{
    background:var(--surface);border-radius:var(--radius);padding:24px;
    display:flex;align-items:flex-start;gap:18px;box-shadow:var(--shadow);
  }
  .session-step .num{
    flex-shrink:0;width:44px;height:44px;border-radius:12px;
    background:var(--primary);color:#fff;font-weight:700;font-size:18px;
    display:flex;align-items:center;justify-content:center;
  }
  .session-step:nth-child(1) .num{background:#0ea5e9}
  .session-step:nth-child(2) .num{background:var(--primary)}
  .session-step:nth-child(3) .num{background:#84cc16}
  .session-step:nth-child(4) .num{background:#a855f7}
  .session-step h3{margin-bottom:4px}
  .session-step p{font-size:14px;color:var(--ink-soft);line-height:1.6}

  /* Compensation */
  .compensation{background:linear-gradient(135deg,#fffaef 0%,#fed7aa 100%)}
  .pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:24px 0 28px}
  .pay-card{
    background:var(--surface);border-radius:var(--radius);padding:24px;
    box-shadow:var(--shadow);
  }
  .pay-card .plabel{font-size:12px;font-weight:600;color:var(--primary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
  .pay-card .pvalue{font-size:clamp(22px,3.4vw,32px);font-weight:800;color:var(--ink);line-height:1.2}
  .pay-card .punit{font-size:13px;color:var(--ink-soft);margin-top:6px}
  .process-list{counter-reset:step;margin-top:24px;background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
  .process-list li{
    list-style:none;counter-increment:step;
    padding:14px 0;border-bottom:1px solid var(--line);
    font-size:15px;color:var(--ink-soft);display:flex;gap:12px;
  }
  .process-list li:last-child{border-bottom:none}
  .process-list li::before{
    content:counter(step,decimal-leading-zero);
    flex-shrink:0;width:34px;height:34px;border-radius:10px;
    background:var(--accent-soft);color:var(--primary);font-weight:700;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }

  /* Parents */
  .parents-card{
    margin-top:24px;background:var(--surface);
    border-radius:var(--radius-lg);padding:32px 24px;
    box-shadow:var(--shadow);text-align:center;
    max-width:680px;
  }
  .parents-card h3{margin-bottom:8px}
  .parents-card p{font-size:14.5px;color:var(--ink-soft);margin-bottom:18px}

  /* FAQ */
  .faq .faq-list{margin-top:28px;max-width:780px}
  .faq details{
    background:var(--surface);border-radius:var(--radius);
    margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden;
  }
  .faq summary{
    padding:18px 22px;cursor:pointer;list-style:none;
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    font-size:16px;font-weight:600;color:var(--ink);
  }
  .faq summary::-webkit-details-marker{display:none}
  .faq summary::after{
    content:"+";color:var(--primary);font-size:22px;font-weight:400;
    transition:transform .2s ease;flex-shrink:0;
  }
  .faq details[open] summary::after{transform:rotate(45deg)}
  .faq details p{padding:0 22px 20px;color:var(--ink-soft);font-size:14.5px;line-height:1.65}

  /* Apply */
  .apply{background:linear-gradient(135deg,#fed7aa 0%,#fbbf24 100%);color:var(--ink)}
  .apply .kicker{color:var(--ink)}
  .apply .kicker::before{background:var(--ink)}
  .apply .lead{color:var(--ink-soft)}
  .apply form{
    margin-top:28px;background:var(--surface);border-radius:var(--radius-lg);
    padding:28px 24px;box-shadow:var(--shadow-lg);max-width:580px;
  }
  .apply label{
    display:block;font-size:12px;font-weight:600;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase;margin:14px 0 6px;
  }
  .apply input,.apply select,.apply textarea{
    width:100%;padding:14px 16px;border:1.5px solid var(--line);
    border-radius:12px;background:#fffbf2;font:inherit;font-size:15px;color:var(--ink);
    transition:border-color .15s ease,background .15s ease;
  }
  .apply input:focus,.apply select:focus,.apply textarea:focus{
    outline:none;border-color:var(--primary);background:#fff;
  }
  .apply input::placeholder,.apply textarea::placeholder{color:var(--muted)}
  .apply select{cursor:pointer;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--primary) 50%),linear-gradient(135deg,var(--primary) 50%,transparent 50%);background-position:calc(100% - 18px) center,calc(100% - 12px) center;background-size:6px 6px,6px 6px;background-repeat:no-repeat}
  .apply textarea{resize:vertical;min-height:90px}
  .apply .submit{
    margin-top:24px;width:100%;padding:16px;border:0;border-radius:999px;
    background:var(--primary);color:#fff;font-weight:700;font-size:15px;
    box-shadow:0 4px 14px rgba(234,88,12,.32);
    transition:background .15s ease,transform .12s ease;
  }
  .apply .submit:hover:not(:disabled){background:var(--primary-hover);transform:translateY(-1px)}
  .apply .submit:disabled{background:#84cc16;cursor:default;box-shadow:none}

  /* Footer */
  footer{
    background:var(--ink);color:#a8a29e;padding:48px 20px 28px;text-align:center;
    font-size:13px;line-height:1.7;
  }
  footer .brand-foot{font-size:24px;font-weight:800;color:#fff;letter-spacing:.04em;margin-bottom:4px}
  footer .brand-foot .spark{color:var(--primary);font-weight:400;margin-right:4px}
  footer .brand-foot-zh{font-size:13px;color:#a8a29e;margin-bottom:18px}
  footer .tagline{font-size:14px;color:#d6d3d1;max-width:38ch;margin:0 auto 18px}
  footer .footer-meta{font-size:12px;color:#78716c;letter-spacing:.08em;margin-bottom:18px}
  footer .legal{padding-top:18px;border-top:1px solid #292524;font-size:11px;color:#78716c;letter-spacing:.1em;text-transform:uppercase}
  footer a{color:var(--accent);text-decoration:none}
  footer a:hover{color:var(--primary-soft)}

  /* ===== Responsive ===== */
  @media(min-width:640px){
    section{padding:80px 32px}
    .hero{padding:64px 32px 88px}
    .archetypes{grid-template-columns:1fr 1fr}
    .vetting .cards{grid-template-columns:1fr 1fr}
    .teachers .teacher-grid{grid-template-columns:1fr 1fr}
    .session-steps{grid-template-columns:1fr 1fr}
    .parents-card{margin-left:auto;margin-right:auto}
  }
  @media(min-width:1024px){
    section{padding:96px 40px}
    .hero{padding:88px 40px 104px}
    .hero h1{max-width:18ch}
    .hero .lead{font-size:20px;max-width:62ch}
    .archetypes{grid-template-columns:repeat(3,1fr);gap:24px}
    .why .pillars{grid-template-columns:repeat(3,1fr);gap:24px}
    .teachers .teacher-grid{grid-template-columns:repeat(3,1fr);gap:20px}
    .session-steps{grid-template-columns:repeat(2,1fr)}
    .pay-grid{max-width:560px}
    .parents-card{margin-left:0}
  }
  @media(min-width:1280px){
    .hero h1{font-size:64px}
  }
</style>
</head>
<body>

<div class="hello-bar">
  <span class="hi">👋 Hello</span><span class="sep">·</span>
  <span class="hi">哈囉</span><span class="sep">·</span>
  <span class="hi">Bonjour</span><span class="sep">·</span>
  <span class="hi">Hallo</span><span class="sep">·</span>
  <span class="hi">こんにちは</span><span class="sep">·</span>
  <span class="hi">Xin chào</span><span class="sep">·</span>
  <span class="hi">Hola</span>
</div>

<nav class="nav">
  <div class="brand">
    <span class="logo"><span class="spark">✦</span>LAIBA</span>
    <span class="logo-zh">來吧文化</span>
  </div>
  <div class="lang-wrap">
    <button class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false">
      <span id="langFlag">🇺🇸</span>
      <span id="langCode">EN</span>
      <span class="chev">▾</span>
    </button>
    <div class="lang-menu" id="langMenu" role="menu"></div>
  </div>
</nav>

<main>

<!-- Hero -->
<section class="hero">
  <div class="wrap">
    <p class="kicker" data-i18n="hero.kicker"></p>
    <h1>
      <span data-i18n="hero.title_pre"></span><span class="highlight" data-i18n="hero.title_h"></span><span data-i18n="hero.title_post"></span>
    </h1>
    <p class="lead" data-i18n="hero.lead"></p>
    <div class="cta-row">
      <a href="#apply" class="cta-primary">
        <span data-i18n="hero.cta_primary"></span>
        <span class="arr">→</span>
      </a>
      <a href="#members" class="cta-secondary" data-i18n="hero.cta_secondary"></a>
    </div>
    <div class="hero-meta">
      <span data-i18n="hero.meta_1"></span>
      <span data-i18n="hero.meta_2"></span>
      <span data-i18n="hero.meta_3"></span>
    </div>
  </div>
</section>

<!-- Members -->
<section id="members" class="members">
  <div class="wrap">
    <p class="kicker" data-i18n="members.kicker"></p>
    <h2 data-i18n="members.title"></h2>
    <p class="lead" data-i18n="members.lead"></p>
    <blockquote class="lead-in-quote" data-i18n="members.lead_in"></blockquote>

    <div class="archetypes">

  var LANGS = [
    {code:'en', label:'English', flag:'🇺🇸', available:true},
    {code:'zh', label:'繁體中文', flag:'🇹🇼', available:true},
    {code:'fr', label:'Français', flag:'🇫🇷', available:false},
    {code:'de', label:'Deutsch', flag:'🇩🇪', available:false},
    {code:'ja', label:'日本語', flag:'🇯🇵', available:false},
    {code:'vi', label:'Tiếng Việt', flag:'🇻🇳', available:false},
    {code:'es', label:'Español', flag:'🇪🇸', available:false}
  ];

  function detectInitialLang(){
    var saved = localStorage.getItem('laiba.lang');
    if (saved && T[saved]) return saved;
    var nav = (navigator.language || '').toLowerCase();
    if (nav.indexOf('zh') === 0) return 'zh';
    return 'en';
  }

  function applyLang(code){
    if (!T[code]) code = 'en';
    document.documentElement.lang = code === 'zh' ? 'zh-Hant' : code;

    var els = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < els.length; i++) {
      var key = els[i].getAttribute('data-i18n');
      var val = T[code][key];
      if (val !== undefined) els[i].textContent = val;
    }
    var phs = document.querySelectorAll('[data-i18n-placeholder]');
    for (var j = 0; j < phs.length; j++) {
      var pkey = phs[j].getAttribute('data-i18n-placeholder');
      var pval = T[code][pkey];
      if (pval !== undefined) phs[j].setAttribute('placeholder', pval);
    }

    var lang = LANGS[0];
    for (var k = 0; k < LANGS.length; k++) if (LANGS[k].code === code) lang = LANGS[k];
    document.getElementById('langFlag').textContent = lang.flag;
    document.getElementById('langCode').textContent = code.toUpperCase();

    var menuBtns = document.querySelectorAll('#langMenu .row');
    for (var m = 0; m < menuBtns.length; m++) {
      menuBtns[m].setAttribute('data-active', menuBtns[m].dataset.code === code ? 'true' : 'false');
    }

    localStorage.setItem('laiba.lang', code);
  }

  function renderLangMenu(){
    var menu = document.getElementById('langMenu');
    while (menu.firstChild) menu.removeChild(menu.firstChild);

    LANGS.forEach(function(l){
      var btn = document.createElement('button');
      btn.className = 'row';
      btn.dataset.code = l.code;
      if (!l.available) btn.disabled = true;

      var lab = document.createElement('span');
      lab.className = 'lab';
      var flag = document.createElement('span');
      flag.className = 'flag';
      flag.textContent = l.flag;
      var labelText = document.createElement('span');
      labelText.textContent = l.label;
      lab.appendChild(flag);
      lab.appendChild(labelText);
      btn.appendChild(lab);

      if (!l.available) {
        var soon = document.createElement('span');
        soon.className = 'soon';
        soon.textContent = 'soon';
        btn.appendChild(soon);
      }

      if (l.available) {
        btn.addEventListener('click', function(){
          applyLang(l.code);
          menu.classList.remove('open');
          document.getElementById('langBtn').setAttribute('aria-expanded','false');
        });
      }

      menu.appendChild(btn);
    });
  }

  document.getElementById('langBtn').addEventListener('click', function(e){
    e.stopPropagation();
    var menu = document.getElementById('langMenu');
    var btn = document.getElementById('langBtn');
    var open = menu.classList.toggle('open');
    btn.setAttribute('aria-expanded', String(open));
  });
  document.addEventListener('click', function(e){
    var menu = document.getElementById('langMenu');
    var btn = document.getElementById('langBtn');
    if (!menu.contains(e.target) && e.target !== btn) {
      menu.classList.remove('open');
      btn.setAttribute('aria-expanded','false');
    }
  });

  document.getElementById('applyForm').addEventListener('submit', function(e){
    e.preventDefault();
    var code = document.documentElement.lang.indexOf('zh') === 0 ? 'zh' : 'en';
    var btn = e.target.querySelector('.submit');
    btn.disabled = true;
    btn.textContent = T[code]['apply.submitted'];
  });

  renderLangMenu();
  applyLang(detectInitialLang());
})();
</script>
